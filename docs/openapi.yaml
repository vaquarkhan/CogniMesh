openapi: 3.0.3
info:
  title: CogniMesh API Gateway
  version: 1.0.0
  description: Local default base URL http://localhost:4000
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Deep health check
      responses:
        "200":
          description: All checks OK
        "503":
          description: Degraded (auth misconfigured or catalog unavailable without fallback)
  /metrics:
    get:
      summary: Prometheus-style counters snapshot
  /api/v1/pipelines/preview:
    post:
      summary: Compile graph to DataContract + Step Functions (no catalog write)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineRequest"
      responses:
        "200":
          description: Preview result
  /api/v1/pipelines/deploy:
    post:
      summary: Deploy pipeline - integrity gate, compile, catalog register
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineRequest"
  /api/v1/pipelines/{name}/history:
    get:
      summary: Pipeline execution history
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: domain
          in: query
          schema:
            type: string
  /api/v1/pipelines/{name}/backfill:
    post:
      summary: Queue date-range backfill
  /api/v1/products:
    get:
      summary: List marketplace products
  /api/v1/products/{id}/lineage:
    get:
      summary: Product lineage graph
  /api/v1/products/{id}/access-requests:
    post:
      summary: Consumer access request (Lake Formation grant workflow)
  /api/v1/lineage/catalog:
    get:
      summary: Lineage catalog summary + graphs
  /api/v1/audit:
    get:
      summary: Recent audit events
  /schemas/data-contract-v1.schema.json:
    get:
      summary: Open DataContract JSON Schema (cognimesh.io/v1)
  /api/v1/platform/dashboard:
    get:
      summary: Live pipeline execution dashboard
      security: [{ bearerAuth: [] }]
  /api/v1/platform/health:
    get:
      summary: Data product health scores
      security: [{ bearerAuth: [] }]
  /api/v1/platform/impact:
    post:
      summary: Deploy impact / blast radius analysis
      security: [{ bearerAuth: [] }]
  /api/v1/platform/preview-source:
    post:
      summary: Source data preview (S3, Athena, JDBC, simulated)
      security: [{ bearerAuth: [] }]
  /api/v1/platform/versions/{domain}/{name}:
    get:
      summary: List pipeline versions for rollback
      security: [{ bearerAuth: [] }]
  /api/v1/platform/billing:
    get:
      summary: Cross-org billing dashboard
      security: [{ bearerAuth: [] }]
  /api/v1/platform/plugins:
    get:
      summary: Plugin registry + canvas blocks
      security: [{ bearerAuth: [] }]
    post:
      summary: Register custom plugin (sandbox validated)
      security: [{ bearerAuth: [] }]
  /api/v1/platform/copilot:
    post:
      summary: Operations copilot (rules or Bedrock LLM)
      security: [{ bearerAuth: [] }]
  /api/v1/platform/import/sfn:
    post:
      summary: Import Step Functions ASL to canvas
      security: [{ bearerAuth: [] }]
  /api/v1/platform/open-spec/site:
    get:
      summary: Public HTML specification site (no auth)
  /api/v1/agents/deploy:
    post:
      summary: Deploy AgentCore manifest to Bedrock
      security: [{ bearerAuth: [] }]
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PipelineRequest:
      type: object
      required: [nodes, pipelineMeta]
      properties:
        nodes:
          type: array
        edges:
          type: array
        pipelineMeta:
          type: object
          properties:
            name:
              type: string
            domain:
              type: string
            version:
              type: string
