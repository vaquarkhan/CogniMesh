name: Docker API (main)

on:
  push:
    branches: [main]
    paths:
      - "docker/api.Dockerfile"
      - "services/api-gateway/**"
      - "lib/**"
      - "package.json"
      - "package-lock.json"
      - "schemas/**"
      - "rules/**"
      - ".github/workflows/docker-api-main.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/vaquarkhan/cognimesh-api

jobs:
  build-push-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:main
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## API image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE }}:main\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE }}:sha-${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Set \`api_container_image\` in prod terraform.tfvars to the sha tag for immutable deploys." >> "$GITHUB_STEP_SUMMARY"
