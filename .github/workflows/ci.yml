name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: |
          for attempt in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $attempt), retrying..."
            sleep 15
          done
          exit 1

      - name: npm audit (critical)
        run: npm audit --omit=dev --audit-level=critical

      - name: npm audit report (high, informational)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Portal production build
        run: npm run test:portal

      - name: Portal unit tests
        run: npm run test:portal-unit

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Portal E2E (Operations panel)
        run: npm run test:portal-e2e

      - name: Integration tests
        run: npm test

      - name: Validate example contracts
        run: |
          npm run validate:contract -- contracts/examples/structured-cdc-pipeline.yaml
          npm run validate:contract -- contracts/examples/cognitive-media-pipeline.yaml

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SDK + test deps
        run: pip install "./python[dev]"

      - name: Python SDK tests
        run: python -m pytest python/tests -q

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
        working-directory: services/cognitive-runtime

  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: mvn -B test
        working-directory: services/catalog

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Format check
        run: terraform fmt -check -recursive infra/terraform
      - name: Validate prod module
        working-directory: infra/terraform/environments/prod
        run: |
          terraform init -backend=false
          terraform validate
      - name: Package and smoke-test Lambda zips
        run: npm run test:lambda-zips
      - name: Terraform plan (no apply)
        working-directory: infra/terraform/environments/prod
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "Skipping terraform plan - set AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY repo secrets to enable"
            exit 0
          fi
          terraform init -input=false
          terraform plan -refresh=false -input=false -lock=false

  docker-compose:
    runs-on: ubuntu-latest
    needs: [node, python, catalog]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Smoke test (catalog + API + portal)
        run: node scripts/docker-smoke-test.js

      - name: Tear down
        if: always()
        run: docker compose down -v
