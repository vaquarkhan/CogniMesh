name: Portal S3 (main)

on:
  push:
    branches: [main]
    paths:
      - "portal/**"
      - ".github/workflows/portal-s3-main.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Build portal
        run: |
          npm ci --prefix portal
          npm run build --prefix portal

      - uses: actions/upload-artifact@v4
        with:
          name: portal-dist
          path: portal/dist/
          retention-days: 7

  deploy-portal:
    needs: build-portal
    if: ${{ vars.PORTAL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: portal-dist
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.PORTAL_AWS_REGION || 'us-east-1' }}

      - name: Sync to S3
        env:
          PORTAL_S3_BUCKET: ${{ secrets.PORTAL_S3_BUCKET }}
        run: |
          if [ -z "$PORTAL_S3_BUCKET" ]; then
            echo "::error::Set repository secret PORTAL_S3_BUCKET"
            exit 1
          fi
          aws s3 sync dist/ "s3://${PORTAL_S3_BUCKET}/" --delete

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Summary
        run: |
          echo "## Portal deployed to S3" >> "$GITHUB_STEP_SUMMARY"
          echo "Bucket: \`${{ secrets.PORTAL_S3_BUCKET }}\`" >> "$GITHUB_STEP_SUMMARY"
