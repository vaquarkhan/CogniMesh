apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognimesh-cognitive-runtime
  namespace: cognimesh
  labels:
    app: cognimesh-cognitive-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cognimesh-cognitive-runtime
  template:
    metadata:
      labels:
        app: cognimesh-cognitive-runtime
    spec:
      containers:
        - name: controller
          image: cognimesh/cognitive-runtime:latest
          ports:
            - containerPort: 8081
          env:
            - name: COGNIMESH_EPOCH_STORE
              value: dynamodb
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: cognimesh-cognitive-runtime
  namespace: cognimesh
spec:
  selector:
    app: cognimesh-cognitive-runtime
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Namespace
metadata:
  name: cognimesh
